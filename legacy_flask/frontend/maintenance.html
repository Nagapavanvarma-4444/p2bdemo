<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | PLAN 2 BUILD</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .maintenance-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-xl);
            background: var(--bg-primary);
        }
        .maintenance-content {
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }
        .maintenance-icon {
            font-size: 5rem;
            margin-bottom: var(--space-xl);
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 3rem; margin-bottom: var(--space-md); color: var(--gold); }
        p { font-size: 1.25rem; color: var(--text-muted); line-height: 1.6; }
        .back-soon {
            margin-top: var(--space-2xl);
            padding: var(--space-md) var(--space-xl);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            display: inline-block;
            font-weight: 500;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-content">
            <div class="maintenance-icon">🏗️</div>
            <h1>Under Construction</h1>
            <p>PLAN 2 BUILD is currently undergoing scheduled maintenance to bring you new features and a better experience. We'll be back online shortly.</p>
            <div class="back-soon">
                We'll be back soon! Thank you for your patience.
            </div>
            <div style="margin-top:var(--space-2xl)">
                <p style="font-size:0.9rem">Contact support@plan2build.com for urgent matters.</p>
            </div>
        </div>
    </div>
</body>
</html>
